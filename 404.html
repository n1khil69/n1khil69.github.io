<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0a0a0a">
<meta name="color-scheme" content="dark">
<title>404 — access denied · Nikhil Sharma</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .err-page { min-height: 100svh; display: grid; place-items: center; padding: var(--gutter); }
  .err-card { font-family: var(--font-mono); max-width: 560px; width: 100%; border: 1px solid var(--line); background: var(--surface); }
  .err-card__body { padding: 28px 26px; font-size: 13.5px; line-height: 1.9; color: var(--muted); }
  .err-card__body .ok { color: var(--acc); }
  .err-card__body .deny { color: #ff5b6e; }
  .err-code { font-family: var(--font-display); font-size: clamp(64px, 18vw, 120px); font-weight: 700; letter-spacing: -0.04em; line-height: 0.9; margin-bottom: 22px; color: var(--acc); text-shadow: 0 0 36px var(--acc-glow); }
  .err-card__foot { padding: 20px 26px; border-top: 1px solid var(--line); }
</style>
</head>
<body>
<div class="grid-lines" aria-hidden="true"></div>
<div class="grain" aria-hidden="true"></div>
<main class="err-page">
  <div class="err-card">
    <div class="idcard__bar">
      <span class="idcard__dots"><i></i><i></i><i></i></span>
      <span class="idcard__file">access_denied.log</span>
    </div>
    <div class="err-card__body">
      <p class="err-code">404</p>
      <p><span class="deny">✗ ACCESS DENIED</span> — you have no entitlement for this resource.</p>
      <p>request logged · <span class="ok">no SoD violation detected</span> · certification not required.</p>
      <p>if you believe this is a provisioning error, raise it with the platform owner.</p>
    </div>
    <div class="err-card__foot">
      <a class="btn btn--primary" href="/">CD ~ <span class="btn__arrow">→</span></a>
    </div>
  </div>
</main>
</body>
</html>
