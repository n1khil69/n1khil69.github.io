name: Visual Check

# Manual smoke test: builds the site, drives it through Playwright across
# viewports (no console errors, hero present, brightness guard) and uploads
# screenshots as an artifact. Does not deploy.
#
# Manual-only by design: it needs to download the Playwright Chromium binary,
# which is blocked on some networks (including this repo's default runners,
# where the install step hangs). Run it via the Actions "Run workflow" button
# from an environment whose runners can reach the Playwright CDN. Job/step
# timeouts ensure it fails fast instead of hanging if the download is blocked.
on:
  workflow_dispatch:

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install Playwright
        timeout-minutes: 6
        run: |
          npm install --no-save playwright@1.49.0 sharp
          npx playwright install chromium
      - name: Run visual check
        run: |
          npm run preview &
          npx --yes wait-on@7 http://localhost:4173/
          node scripts/visual-check.mjs
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: shots/
