<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>nik.io // identity graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <script type="importmap">
  {
    "imports": {
      "react":               "https://esm.sh/react@18.3.1",
      "react/":              "https://esm.sh/react@18.3.1/",
      "react-dom":           "https://esm.sh/react-dom@18.3.1?deps=react@18.3.1",
      "react-dom/client":    "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
      "three":               "https://esm.sh/three@0.160.0",
      "@react-three/fiber":  "https://esm.sh/@react-three/fiber@8.15.16?deps=react@18.3.1,react-dom@18.3.1,three@0.160.0",
      "@react-three/drei":   "https://esm.sh/@react-three/drei@9.99.4?deps=react@18.3.1,react-dom@18.3.1,three@0.160.0,@react-three/fiber@8.15.16",
      "@react-three/postprocessing": "https://esm.sh/@react-three/postprocessing@2.16.2?deps=react@18.3.1,react-dom@18.3.1,three@0.160.0,@react-three/fiber@8.15.16",

  <style>
    :root {
      --cy: #22d3ee;
      --mg: #e879f9;
      --gd: #fde047;
      --gr: #4ade80;
      --bg: #050816;
      --ink: #d6f0ff;
    }
    html, body, #root { height: 100%; margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
    canvas { display: block; }

    /* scan lines + grain */
    .crt::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 40;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
      mix-blend-mode: overlay;
    }
    .crt::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 41;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%);
    }

    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    .hud {
      position: fixed; z-index: 50; pointer-events: none;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .04em;
      color: var(--cy); text-shadow: 0 0 6px rgba(34,211,238,0.5);
    }
    .hud .panel { background: rgba(5,8,22,0.55); backdrop-filter: blur(8px);
      border: 1px solid rgba(34,211,238,0.25); padding: 10px 14px; border-radius: 4px;
      pointer-events: auto;
    }
    .hud a { color: var(--mg); pointer-events: auto; }

    .name-plate {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%); z-index: 50;
      font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: .35em;
      padding: 10px 22px; border-radius: 2px;
      background: linear-gradient(90deg, rgba(34,211,238,0.12), rgba(232,121,249,0.12));
      border: 1px solid rgba(34,211,238,0.5);
      box-shadow: 0 0 24px rgba(34,211,238,0.25), inset 0 0 18px rgba(232,121,249,0.15);
      color: #eafff8; pointer-events: none;
    }
    .name-plate .sub { display:block; font-weight:400; font-size:10px; letter-spacing:.5em; color: var(--mg); opacity: .8; margin-top: 4px; }

    .legend-dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px currentColor; }

    .card {
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(180deg, rgba(5,8,22,0.92), rgba(5,8,22,0.78));
      border: 1px solid var(--node-color, var(--cy));
      box-shadow: 0 0 24px var(--node-color, var(--cy)), inset 0 0 12px rgba(0,0,0,0.6);
      color: var(--ink); padding: 12px 14px; border-radius: 3px;
      backdrop-filter: blur(6px);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 4px);
      pointer-events: none;
    }
    .card .tag { display:inline-block; padding: 2px 6px; border:1px solid currentColor; color: var(--node-color, var(--cy)); font-size:10px; letter-spacing:.18em; margin-bottom: 6px; }
    .card .title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .card .body  { font-size: 12px; line-height: 18px; color: #b9d8ff; white-space: pre-wrap; }
    .card .meta  { margin-top: 8px; font-size: 10px; color: var(--mg); letter-spacing:.18em; }

    .scroll-hint { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .35 } 50% { opacity: 1 } }

    .cursor-grab canvas { cursor: grab; }
    .cursor-grabbing canvas { cursor: grabbing; }

    .booting { position: fixed; inset: 0; display: grid; place-items: center; background: var(--bg); z-index: 100; transition: opacity .8s; font-family: 'JetBrains Mono', monospace; color: var(--cy); letter-spacing: .3em; }
  </style>
</head>
<body class="crt">
  <div id="boot" class="booting">[ initializing identity graph ]</div>
  <div id="root"></div>

  <script>
    // Surface any module-load / runtime error on the boot screen instead of hanging.
    function showBootError(msg) {
      const b = document.getElementById('boot');
      if (!b) return;
      b.style.color = '#ff6b9b';
      b.style.fontSize = '12px';
      b.style.padding = '24px';
      b.style.textAlign = 'left';
      b.style.whiteSpace = 'pre-wrap';
      b.style.alignContent = 'start';
      b.textContent = '[ boot failed ]\n\n' + msg + '\n\n(open devtools console for full trace)';
    }
    window.addEventListener('error', (e) => {
      console.error('[boot]', e.error || e.message);
      showBootError((e.error && e.error.stack) || e.message || 'unknown error');
    });
    window.addEventListener('unhandledrejection', (e) => {
      console.error('[boot] unhandled rejection', e.reason);
      showBootError((e.reason && (e.reason.stack || e.reason.message)) || String(e.reason));
    });
    // Hard timeout: if React hasn't mounted in 12s, show a fallback message.
    setTimeout(() => {
      const root = document.getElementById('root');
      if (root && root.childElementCount === 0) {
        showBootError('timed out waiting for modules.\nlikely cause: file:// blocking importmap fetches.\nrun a local server, e.g.:\n  python -m http.server 8000\nthen open http://localhost:8000/');
      }
    }, 12000);
  </script>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useEffect, useMemo, useRef, useState, Suspense } from 'react'
    import { createRoot } from 'react-dom/client'
    import * as THREE from 'three'
    import { Canvas, useFrame, useThree } from '@react-three/fiber'
    import { Html, Line, Stars, Float, Sparkles, RoundedBox, Text } from '@react-three/drei'
    import { EffectComposer, Bloom, Vignette, ChromaticAberration } from '@react-three/postprocessing'
    import * as Pretext from '@chenglou/pretext'

    // ---------- portfolio data ----------
    const ME = {
      name: 'NIKHIL',
      handle: 'nik.io',
      tagline: 'Senior IAM Engineer · identity, access, trust',
    }

    const NODES = [
      // ROLES
      { id: 'role-iam',   cat: 'role',    label: 'Senior IAM Engineer',
        body: 'Designing and operating identity & access systems at scale.\nAuthN, AuthZ, lifecycle, governance — end to end.',
        meta: '> primary role · 2024→' },
      { id: 'role-arch',  cat: 'role',    label: 'Identity Architect',
        body: 'Zero-trust patterns, federation topology, trust-bootstrapping.\nHelping teams ship the right primitive, not the loud one.',
        meta: '> advisory · cross-org' },

      // PROJECTS
      { id: 'proj-okta',  cat: 'project', label: 'Okta → Workforce Migration',
        body: 'Migrated 12k identities from a legacy IdP onto Okta with\nzero downtime. SCIM bridges, group-mapping DSL, full audit.',
        meta: '> outcome · 99.99% session continuity' },
      { id: 'proj-saml',  cat: 'project', label: 'SAML/OIDC Broker',
        body: 'Self-hosted broker translating SAML ⇄ OIDC for legacy SaaS.\nHardened against XSW, replay, and audience confusion.',
        meta: '> stack · go · redis · terraform' },
      { id: 'proj-pim',   cat: 'project', label: 'Just-in-Time PIM',
        body: 'Time-boxed elevation w/ approval graph + slack workflows.\nMean privileged-session shrunk from 8h to 22min.',
        meta: '> impact · -73% standing access' },
      { id: 'proj-graph', cat: 'project', label: 'Access Graph (this site)',
        body: 'A living visualization of access relationships.\nyou are looking at a tiny instance of it — say hi 👋 春天到了',
        meta: '> meta · pretext-measured tooltips' },

      // SKILLS
      { id: 'sk-okta',    cat: 'skill',   label: 'Okta',                body: 'Workforce + CIC, custom auth, hooks, lifecycle.', meta: '> 5y' },
      { id: 'sk-saml',    cat: 'skill',   label: 'SAML / OIDC / SCIM',  body: 'Protocol-level fluency. Read the RFCs so you don\'t have to.', meta: '> deep' },
      { id: 'sk-tf',      cat: 'skill',   label: 'Terraform',           body: 'Identity-as-code. Modules, drift, policy-as-code with OPA.', meta: '> idiomatic' },
      { id: 'sk-py',      cat: 'skill',   label: 'Python',              body: 'Async services, glue, security tooling.', meta: '> daily driver' },
      { id: 'sk-go',      cat: 'skill',   label: 'Go',                  body: 'Brokers and edge services where latency matters.', meta: '> production' },
      { id: 'sk-aws',     cat: 'skill',   label: 'AWS IAM',             body: 'SCPs, trust policies, IRSA. Least-privilege without the pain.', meta: '> opinionated' },

      // CONTACT
      { id: 'c-gh',  cat: 'contact', label: 'github · n1khil69',
        body: 'open source experiments, infra notes, this portfolio source.', meta: '> github.com/n1khil69',
        href: 'https://github.com/n1khil69' },
      { id: 'c-dc',  cat: 'contact', label: 'discord · nik.io',
        body: 'low-noise. ping for IAM nerd talk or hiring chats.', meta: '> @nik.io',
        href: 'https://discord.com/users/nik.io' },
    ]

    const CAT_COLOR = {
      role:    '#22d3ee',
      project: '#e879f9',
      skill:   '#fde047',
      contact: '#4ade80',
    }
    const CAT_LABEL = {
      role:    'ROLES',
      project: 'PROJECTS',
      skill:   'SKILLS',
      contact: 'CONTACT',
    }

    // ---------- pretext-measured card ----------
    const CARD_WIDTH = 280   // px (content area)
    const CARD_FONT  = '12px "JetBrains Mono", monospace'
    const CARD_LH    = 18

    function measureCardHeight(text) {
      try {
        const prepared = Pretext.prepare(text, CARD_FONT, { whiteSpace: 'pre-wrap' })
        const { height } = Pretext.layout(prepared, CARD_WIDTH, CARD_LH)
        return height
      } catch (e) {
        // graceful fallback if pretext API or fonts not ready
        const lines = text.split('\n').length
        return lines * CARD_LH
      }
    }

    function NodeCard({ node, fontsReady }) {
      const color = CAT_COLOR[node.cat]
      const bodyHeight = useMemo(
        () => fontsReady ? measureCardHeight(node.body) : null,
        [node.body, fontsReady]
      )
      const Tag = node.href ? 'a' : 'div'
      const tagProps = node.href ? { href: node.href, target: '_blank', rel: 'noreferrer' } : {}
      return (
        <Tag
          {...tagProps}
          className="card"
          style={{ ['--node-color']: color, width: CARD_WIDTH + 28 + 'px', display: 'block', textDecoration: 'none' }}
        >
          <div className="tag">{CAT_LABEL[node.cat]}</div>
          <div className="title">{node.label}</div>
          <div
            className="body"
            style={{
              width: CARD_WIDTH + 'px',
              height: bodyHeight ? bodyHeight + 'px' : 'auto',
              lineHeight: CARD_LH + 'px',
            }}
          >
            {node.body}
          </div>
          <div className="meta">{node.meta}</div>
        </Tag>
      )
    }

    // ---------- 3D primitives ----------
    function position(i, n, cat) {
      // place by category in concentric shells
      const ringRadius = { role: 4.2, project: 6.4, skill: 8.6, contact: 10.6 }[cat] ?? 6
      // count items per category, compute angle within shell
      const sameCat = NODES.filter(x => x.cat === cat)
      const idx = sameCat.findIndex(x => x.id === NODES[i].id)
      const total = sameCat.length
      const a = (idx / total) * Math.PI * 2 + (cat === 'project' ? 0.4 : 0)
      const tilt = { role: 0.0, project: 0.18, skill: -0.22, contact: 0.35 }[cat] ?? 0
      const x = Math.cos(a) * ringRadius
      const z = Math.sin(a) * ringRadius
      const y = Math.sin(a * 2 + i) * 0.9 + tilt * ringRadius * 0.4
      return [x, y, z]
    }

    function CenterCore() {
      const ref = useRef()
      useFrame((s, dt) => {
        if (!ref.current) return
        ref.current.rotation.y += dt * 0.25
        ref.current.rotation.x += dt * 0.07
      })
      return (
        <group ref={ref}>
          <mesh>
            <icosahedronGeometry args={[1.1, 1]} />
            <meshStandardMaterial color="#0a1428" emissive="#22d3ee" emissiveIntensity={1.4} wireframe />
          </mesh>
          <mesh>
            <icosahedronGeometry args={[0.78, 0]} />
            <meshStandardMaterial color="#050816" emissive="#e879f9" emissiveIntensity={0.9} />
          </mesh>
          <Sparkles count={40} scale={3} size={2.2} speed={0.5} color="#22d3ee" />
          <Text position={[0, 0, 1.25]} fontSize={0.18} color="#e0fbff" anchorX="center" anchorY="middle">
            {ME.handle}
          </Text>
        </group>
      )
    }

    function Beam({ from, to, color, delay = 0 }) {
      const ref = useRef()
      const points = useMemo(() => [new THREE.Vector3(...from), new THREE.Vector3(...to)], [from, to])
      useFrame((s) => {
        if (!ref.current) return
        const t = s.clock.elapsedTime + delay
        const m = ref.current.material
        if (m) {
          m.dashOffset = -t * 0.6
          m.opacity = 0.35 + 0.35 * (0.5 + 0.5 * Math.sin(t * 1.3))
        }
      })
      return (
        <Line
          ref={ref}
          points={points}
          color={color}
          lineWidth={1}
          dashed
          dashScale={6}
          dashSize={0.15}
          gapSize={0.25}
          transparent
          opacity={0.5}
        />
      )
    }

    function Node({ node, pos, onHover, hovered, fontsReady }) {
      const color = CAT_COLOR[node.cat]
      const ref = useRef()
      const [hot, setHot] = useState(false)
      const isActive = hovered === node.id
      useFrame((s, dt) => {
        if (!ref.current) return
        const target = isActive ? 1.6 : (hot ? 1.3 : 1.0)
        ref.current.scale.lerp(new THREE.Vector3(target, target, target), 1 - Math.pow(0.001, dt))
        ref.current.rotation.y += dt * 0.6
      })
      const size = node.cat === 'project' ? 0.42 : node.cat === 'role' ? 0.46 : node.cat === 'contact' ? 0.36 : 0.3
      return (
        <group position={pos}>
          <Float speed={1.2} rotationIntensity={0.4} floatIntensity={0.6}>
            <mesh
              ref={ref}
              onPointerOver={(e) => { e.stopPropagation(); setHot(true); onHover(node.id); document.body.style.cursor = 'pointer' }}
              onPointerOut={()  => { setHot(false); onHover(null); document.body.style.cursor = '' }}
              onClick={() => { if (node.href) window.open(node.href, '_blank') }}
            >
              <icosahedronGeometry args={[size, 0]} />
              <meshStandardMaterial
                color="#08111f"
                emissive={color}
                emissiveIntensity={isActive ? 2.4 : 1.2}
                metalness={0.4}
                roughness={0.25}
              />
            </mesh>
          </Float>
          <Text
            position={[0, -size - 0.28, 0]}
            fontSize={0.13}
            color={color}
            anchorX="center"
            anchorY="middle"
            outlineWidth={0.005}
            outlineColor="#000"
          >
            {node.label}
          </Text>
          {isActive && (
            <Html
              position={[size + 0.2, size + 0.2, 0]}
              center={false}
              distanceFactor={8}
              zIndexRange={[100, 0]}
              style={{ pointerEvents: 'auto' }}
            >
              <NodeCard node={node} fontsReady={fontsReady} />
            </Html>
          )}
        </group>
      )
    }

    function GridFloor() {
      return (
        <group position={[0, -3.6, 0]}>
          <gridHelper args={[60, 60, '#22d3ee', '#0a2a3a']} />
          <mesh rotation={[-Math.PI / 2, 0, 0]}>
            <planeGeometry args={[60, 60]} />
            <meshBasicMaterial color="#040616" transparent opacity={0.92} />
          </mesh>
        </group>
      )
    }

    function CameraRig() {
      const { camera } = useThree()
      const target = useRef({ r: 14, phi: 1.15, theta: 0.6 })
      const cur    = useRef({ r: 18, phi: 1.4,  theta: 0.0 })
      const lastInput = useRef(performance.now())
      useEffect(() => {
        const onWheel = (e) => {
          target.current.r = Math.max(7, Math.min(22, target.current.r + e.deltaY * 0.01))
          target.current.theta += e.deltaX * 0.002
          lastInput.current = performance.now()
        }
        const onMove = (e) => {
          if (e.buttons !== 1) return
          target.current.theta -= e.movementX * 0.005
          target.current.phi   = Math.max(0.4, Math.min(Math.PI - 0.4, target.current.phi - e.movementY * 0.005))
          lastInput.current = performance.now()
        }
        window.addEventListener('wheel', onWheel, { passive: true })
        window.addEventListener('pointermove', onMove)
        return () => {
          window.removeEventListener('wheel', onWheel)
          window.removeEventListener('pointermove', onMove)
        }
      }, [])
      useFrame((s, dt) => {
        // idle auto-orbit
        if (performance.now() - lastInput.current > 3500) {
          target.current.theta += dt * 0.06
        }
        const k = 1 - Math.pow(0.001, dt)
        cur.current.r     += (target.current.r     - cur.current.r)     * k
        cur.current.phi   += (target.current.phi   - cur.current.phi)   * k
        cur.current.theta += (target.current.theta - cur.current.theta) * k
        const { r, phi, theta } = cur.current
        camera.position.set(
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta),
        )
        camera.lookAt(0, 0, 0)
      })
      return null
    }

    // ---------- HUD ----------
    const LOG_LINES = [
      'session: nik.io · status: online',
      '> bootstrapping trust anchors ✓',
      '> resolving identity graph ✓',
      '> issuing scoped tokens ✓',
      '> handshake/  春天到了 🚀',
      '> waiting for visitor input…',
    ]

    function HudLog({ fontsReady }) {
      const [shown, setShown] = useState([])
      useEffect(() => {
        let cancelled = false
        let i = 0
        const tick = () => {
          if (cancelled) return
          setShown(s => [...s, LOG_LINES[i % LOG_LINES.length]].slice(-6))
          i++
          setTimeout(tick, 1400 + Math.random() * 600)
        }
        tick()
        return () => { cancelled = true }
      }, [])

      // pretext-measured manual line layout for each log line, so wraps are stable
      const rendered = useMemo(() => {
        if (!fontsReady) return shown.map((t, i) => ({ text: t, lines: [t], key: i }))
        return shown.map((t, i) => {
          try {
            const prepared = Pretext.prepareWithSegments(t, '11px "JetBrains Mono", monospace', { whiteSpace: 'pre-wrap' })
            const { lines } = Pretext.layoutWithLines(prepared, 280, 16)
            return { text: t, lines: lines.map(l => l.text ?? l.string ?? l), key: i }
          } catch {
            return { text: t, lines: [t], key: i }
          }
        })
      }, [shown, fontsReady])

      return (
        <div className="hud" style={{ top: 22, left: 22, maxWidth: 300 }}>
          <div className="panel">
            {rendered.map(({ lines, key }) => (
              <div key={key} style={{ lineHeight: '16px' }}>
                {lines.map((l, j) => <div key={j}>{l}</div>)}
              </div>
            ))}
          </div>
        </div>
      )
    }

    function Legend() {
      return (
        <div className="hud" style={{ bottom: 22, right: 22 }}>
          <div className="panel" style={{ display: 'flex', gap: 14 }}>
            {Object.entries(CAT_LABEL).map(([k, v]) => (
              <div key={k} style={{ color: CAT_COLOR[k] }}>
                <span className="legend-dot" style={{ background: CAT_COLOR[k], color: CAT_COLOR[k] }} />
                {v}
              </div>
            ))}
          </div>
        </div>
      )
    }

    function ScrollHint() {
      return (
        <div className="hud scroll-hint" style={{ bottom: 22, left: 22 }}>
          <div className="panel">
            scroll · drag · hover  /  ⟁ navigate the graph
          </div>
        </div>
      )
    }

    function NamePlate({ width }) {
      return (
        <div className="name-plate" style={{ width: width ? width + 32 + 'px' : 'auto' }}>
          {ME.name}
          <span className="sub">{ME.tagline}</span>
        </div>
      )
    }

    // ---------- App ----------
    function App() {
      const [hovered, setHovered] = useState(null)
      const [fontsReady, setFontsReady] = useState(false)
      const [nameWidth, setNameWidth] = useState(null)

      useEffect(() => {
        // Hide boot screen as soon as React mounts — don't gate on fonts.
        const hideBoot = () => {
          const b = document.getElementById('boot')
          if (b) { b.style.opacity = '0'; setTimeout(() => b.remove(), 900) }
        }
        hideBoot()

        const ready = document.fonts?.ready ?? Promise.resolve()
        ready.then(() => {
          setFontsReady(true)
          try {
            const prepared = Pretext.prepare(ME.name, '700 22px "JetBrains Mono", monospace')
            const stats = Pretext.measureLineStats && Pretext.measureLineStats(prepared)
            if (stats && stats.width) setNameWidth(Math.ceil(stats.width))
          } catch (e) { console.warn('[pretext] nameplate measure skipped:', e) }
        }).catch((e) => {
          console.warn('[boot] fonts.ready rejected, continuing without precise measurements', e)
          setFontsReady(true)
        })
      }, [])

      return (
        <>
          <NamePlate width={nameWidth} />
          <HudLog fontsReady={fontsReady} />
          <Legend />
          <ScrollHint />

          <Canvas
            camera={{ position: [0, 4, 18], fov: 55, near: 0.1, far: 200 }}
            dpr={[1, 2]}
            gl={{ antialias: true, alpha: false }}
            onCreated={({ gl, scene }) => {
              gl.setClearColor('#050816')
              scene.fog = new THREE.FogExp2('#050816', 0.04)
            }}
          >
            <ambientLight intensity={0.3} />
            <pointLight position={[6, 8, 6]} intensity={1.2} color="#22d3ee" />
            <pointLight position={[-8, -4, -6]} intensity={0.9} color="#e879f9" />

            <Stars radius={80} depth={40} count={2200} factor={3} fade speed={0.3} />
            <GridFloor />
            <CenterCore />

            <Suspense fallback={null}>
              {NODES.map((n, i) => {
                const pos = position(i, NODES.length, n.cat)
                return (
                  <React.Fragment key={n.id}>
                    <Beam from={[0, 0, 0]} to={pos} color={CAT_COLOR[n.cat]} delay={i * 0.31} />
                    <Node node={n} pos={pos} onHover={setHovered} hovered={hovered} fontsReady={fontsReady} />
                  </React.Fragment>
                )
              })}
            </Suspense>

            <CameraRig />

            <EffectComposer multisampling={0}>
              <Bloom intensity={0.9} luminanceThreshold={0.15} luminanceSmoothing={0.4} mipmapBlur />
              <ChromaticAberration offset={[0.0008, 0.0008]} />
              <Vignette eskil={false} offset={0.2} darkness={0.85} />
            </EffectComposer>
          </Canvas>
        </>
      )
    }

    createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
